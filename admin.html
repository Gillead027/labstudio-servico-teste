<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - LabStudio CRJ</title>

  <style>
    /* ===============================
       CORES DO PAINEL ADMIN
    =============================== */
    :root {
      --primary: #6366f1;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #475569;
      --input: #334155;
    }

    /* ===============================
       ESTILO GERAL
    =============================== */
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      color: var(--primary);
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 30px;
    }

    /* ===============================
       ÁREA DE FILTROS
    =============================== */
    .filtros {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }

    .grupo {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    input, select {
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
      color: white;
      background: var(--primary);
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-presenca {
      background: var(--success);
    }

    .btn-falta {
      background: var(--warning);
    }

    .btn-cancelar {
      background: var(--danger);
    }

    .btn-secundario {
      background: var(--border);
    }

    /* ===============================
       CARDS DE AGENDAMENTO
    =============================== */
    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .linha-topo {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .nome {
      font-size: 1.1rem;
      font-weight: bold;
    }

    .status {
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .status-agendado {
      background: #334155;
      color: #cbd5e1;
    }

    .status-compareceu {
      background: #14532d;
      color: #bbf7d0;
    }

    .status-faltou {
      background: #713f12;
      color: #fde68a;
    }

    .status-cancelado {
      background: #7f1d1d;
      color: #fecaca;
    }

    .info {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .acoes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .vazio {
      color: var(--muted);
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Painel Admin - LabStudio CRJ</h1>
    <div class="subtitle">Gerencie agendamentos, presenças, faltas e cancelamentos.</div>

    <!-- ===============================
         FILTROS DO PAINEL
    =============================== -->
    <div class="filtros">
      <div class="grupo">
        <label for="filtroData">Filtrar por data</label>
        <input type="date" id="filtroData">
      </div>

      <div class="grupo">
        <label for="filtroStatus">Status</label>
        <select id="filtroStatus">
          <option value="">Todos</option>
          <option value="agendado">Agendado</option>
          <option value="compareceu">Compareceu</option>
          <option value="faltou">Faltou</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>

      <button id="btnFiltrar">Filtrar</button>
      <button id="btnLimpar" class="btn-secundario">Limpar</button>
    </div>

    <div id="listaAgendamentos"></div>
  </div>

  <!-- ===============================
       BIBLIOTECA SUPABASE
  =============================== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ===============================
    // CONEXÃO COM SUPABASE
    // ===============================
    const client = window.supabase.createClient(
      "https://hblxvxgocemzctjbutgi.supabase.co",
      "sb_publishable_12C1Wu47s3SuxqHZvQybdg_WubBGiQl"
    );

    // ===============================
    // ELEMENTOS DA TELA
    // ===============================
    const lista = document.getElementById("listaAgendamentos");
    const filtroData = document.getElementById("filtroData");
    const filtroStatus = document.getElementById("filtroStatus");
    const btnFiltrar = document.getElementById("btnFiltrar");
    const btnLimpar = document.getElementById("btnLimpar");

    // ===============================
    // FUNÇÃO: ESCAPAR TEXTO
    // Evita que texto digitado por usuário quebre o HTML
    // ===============================
    function escaparHtml(valor) {
      return String(valor || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // ===============================
    // FUNÇÃO: FORMATAR DATA
    // Recebe 2025-05-30 e mostra 30/05/2025
    // ===============================
    function formatarData(data) {
      if (!data) return "";
      const dataLimpa = String(data).split("T")[0];
      const [ano, mes, dia] = dataLimpa.split("-");
      return `${dia}/${mes}/${ano}`;
    }

    // ===============================
    // FUNÇÃO: CLASSE VISUAL DO STATUS
    // Define a cor do status no card
    // ===============================
    function classeStatus(status) {
      if (status === "compareceu") return "status status-compareceu";
      if (status === "faltou") return "status status-faltou";
      if (status === "cancelado") return "status status-cancelado";
      return "status status-agendado";
    }

    // ===============================
    // FUNÇÃO: LIMPAR TELEFONE
    // Remove tudo que não for número
    //
    // Exemplo:
    // "+55 27 99713-6155"
    // vira:
    // "5527997136155"
    // ===============================
    function limparTelefone(valor) {
      return String(valor || "").replace(/\D/g, "");
    }

    // ===============================
    // FUNÇÃO: GERAR VARIAÇÕES DO TELEFONE
    //
    // Ajuda o painel a encontrar o usuário certo
    // mesmo que o telefone esteja salvo de formas diferentes:
    // - com +55
    // - sem +55
    // - com traço
    // - sem traço
    // - com ou sem o 9º dígito
    // ===============================
    function gerarVariantesTelefone(valor) {
      const numero = limparTelefone(valor);

      if (!numero) return [];

      const variantes = new Set();

      function adicionar(n) {
        if (!n) return;

        variantes.add(n);

        if (n.startsWith("55")) {
          variantes.add(n.slice(2));
        } else {
          variantes.add("55" + n);
        }
      }

      adicionar(numero);

      const sem55 = numero.startsWith("55") ? numero.slice(2) : numero;

      adicionar(sem55);

      // Exemplo: 27997136155 também testa 2797136155
      if (sem55.length === 11 && sem55[2] === "9") {
        const semNonoDigito = sem55.slice(0, 2) + sem55.slice(3);
        adicionar(semNonoDigito);
      }

      // Exemplo: 2797136155 também testa 27997136155
      if (sem55.length === 10) {
        const comNonoDigito = sem55.slice(0, 2) + "9" + sem55.slice(2);
        adicionar(comNonoDigito);
      }

      return [...variantes];
    }

    // ===============================
    // FUNÇÃO: BUSCAR USUÁRIO PELO TELEFONE
    //
    // Essa função compara o telefone do agendamento
    // com os telefones cadastrados na tabela usuarios.
    // Ela usa variações para evitar erro de formato.
    // ===============================
    async function buscarUsuarioPorTelefone(telefone) {
      const variantesDigitadas = gerarVariantesTelefone(telefone);

      console.log("🔎 Variantes do telefone do agendamento:", variantesDigitadas);

      const { data: usuarios, error } = await client
        .from("usuarios")
        .select("*");

      if (error) {
        console.warn("Erro ao buscar usuários:", error.message);
        return null;
      }

      const usuarioEncontrado = (usuarios || []).find(usuario => {
        const variantesBanco = gerarVariantesTelefone(usuario.telefone);

        return variantesBanco.some(numeroBanco =>
          variantesDigitadas.includes(numeroBanco)
        );
      });

      if (usuarioEncontrado) {
        console.log("✅ Usuário encontrado:", usuarioEncontrado.nome, usuarioEncontrado.telefone);
      } else {
        console.warn("❌ Usuário não encontrado para o telefone:", telefone);
      }

      return usuarioEncontrado || null;
    }

    // ===============================
    // FUNÇÃO: BUSCAR AGENDAMENTO POR ID
    // Usada para evitar somar falta/presença repetidamente
    // ===============================
    async function buscarAgendamentoPorId(id) {
      const { data, error } = await client
        .from("agendamentos")
        .select("*")
        .eq("id", id)
        .maybeSingle();

      if (error) {
        throw error;
      }

      return data;
    }

    // ===============================
    // FUNÇÃO: ATUALIZAR CONTADORES DO USUÁRIO
    //
    // Usada para:
    // - somar presença
    // - somar falta
    // - corrigir contagem se você mudar de "faltou" para "compareceu"
    // ===============================
    async function atualizarContadoresUsuario(telefone, presencasDelta, faltasDelta) {
      const usuario = await buscarUsuarioPorTelefone(telefone);

      if (!usuario) {
        alert("Não encontrei o usuário na tabela usuarios para atualizar presença/falta.");
        return false;
      }

      const presencasAtuais = Number(usuario.presencas || 0);
      const faltasAtuais = Number(usuario.faltas || 0);

      const novasPresencas = Math.max(0, presencasAtuais + presencasDelta);
      const novasFaltas = Math.max(0, faltasAtuais + faltasDelta);

      let novoStatus = usuario.status || "ativo";

      // Se chegou a 2 faltas, bloqueia automaticamente
      if (novasFaltas >= 2) {
        novoStatus = "bloqueado";
      }

      // Se foi uma correção e caiu para menos de 2 faltas, desbloqueia
      if (String(novoStatus).toLowerCase() === "bloqueado" && novasFaltas < 2) {
        novoStatus = "ativo";
      }

      const { error } = await client
        .from("usuarios")
        .update({
          presencas: novasPresencas,
          faltas: novasFaltas,
          status: novoStatus
        })
        .eq("id", usuario.id);

      if (error) {
        alert("Erro ao atualizar usuário: " + error.message);
        return false;
      }

      console.log("✅ Usuário atualizado:", {
        nome: usuario.nome,
        presencas: novasPresencas,
        faltas: novasFaltas,
        status: novoStatus
      });

      return true;
    }

    // ===============================
    // FUNÇÃO: CARREGAR AGENDAMENTOS
    // Busca os agendamentos no Supabase e monta os cards
    // ===============================
    async function carregarAgendamentos() {
      lista.innerHTML = '<div class="vazio">Carregando agendamentos...</div>';

      let query = client
        .from("agendamentos")
        .select("*")
        .order("data", { ascending: true })
        .order("horario", { ascending: true });

      if (filtroData.value) {
        query = query.eq("data", filtroData.value);
      }

      if (filtroStatus.value) {
        query = query.eq("status", filtroStatus.value);
      }

      const { data, error } = await query;

      if (error) {
        lista.innerHTML = `<div class="vazio">Erro ao carregar: ${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        lista.innerHTML = '<div class="vazio">Nenhum agendamento encontrado.</div>';
        return;
      }

      lista.innerHTML = "";

      data.forEach((agendamento) => {
        const status = agendamento.status || "agendado";

        const card = document.createElement("div");
        card.className = "card";

        const desabilitarPresenca = status === "compareceu" || status === "cancelado";
        const desabilitarFalta = status === "faltou" || status === "cancelado";
        const desabilitarCancelar = status !== "agendado";

        card.innerHTML = `
          <div class="linha-topo">
            <div class="nome">${escaparHtml(agendamento.nome || "Sem nome")}</div>
            <div class="${classeStatus(status)}">${escaparHtml(status)}</div>
          </div>

          <div class="info">
            📱 Telefone: ${escaparHtml(agendamento.telefone || "Não informado")}<br>
            📅 Data: ${formatarData(agendamento.data)}<br>
            ⏰ Horário: ${escaparHtml(agendamento.horario || "-")}
          </div>

          <div class="acoes">
            <button class="btn-presenca" ${desabilitarPresenca ? "disabled" : ""}>
              Confirmar presença
            </button>

            <button class="btn-falta" ${desabilitarFalta ? "disabled" : ""}>
              Marcar falta
            </button>

            <button class="btn-cancelar" ${desabilitarCancelar ? "disabled" : ""}>
              Cancelar
            </button>
          </div>
        `;

        // ===============================
        // EVENTOS DOS BOTÕES
        // Usamos addEventListener em vez de onclick
        // para evitar erro com IDs UUID ou textos especiais
        // ===============================
        const btnPresenca = card.querySelector(".btn-presenca");
        const btnFalta = card.querySelector(".btn-falta");
        const btnCancelar = card.querySelector(".btn-cancelar");

        btnPresenca.addEventListener("click", () => {
          confirmarPresenca(agendamento.id);
        });

        btnFalta.addEventListener("click", () => {
          marcarFalta(agendamento.id);
        });

        btnCancelar.addEventListener("click", () => {
          cancelarAgendamento(agendamento.id);
        });

        lista.appendChild(card);
      });
    }

    // ===============================
    // FUNÇÃO: CONFIRMAR PRESENÇA
    //
    // Regras:
    // - Se estava "agendado": soma +1 presença
    // - Se estava "faltou": corrige, tira 1 falta e soma 1 presença
    // - Se já estava "compareceu": não soma de novo
    // - Se estava "cancelado": não permite
    // ===============================
    async function confirmarPresenca(agendamentoId) {
      const confirmar = confirm("Confirmar presença deste jovem?");
      if (!confirmar) return;

      try {
        const agendamento = await buscarAgendamentoPorId(agendamentoId);

        if (!agendamento) {
          alert("Agendamento não encontrado.");
          return;
        }

        const statusAtual = agendamento.status || "agendado";

        if (statusAtual === "compareceu") {
          alert("Este agendamento já está marcado como compareceu.");
          return;
        }

        if (statusAtual === "cancelado") {
          alert("Este agendamento está cancelado e não pode receber presença.");
          return;
        }

        let presencasDelta = 1;
        let faltasDelta = 0;

        // Se estava como falta e você corrigiu para presença,
        // remove uma falta também.
        if (statusAtual === "faltou") {
          faltasDelta = -1;
        }

        const usuarioAtualizado = await atualizarContadoresUsuario(
          agendamento.telefone,
          presencasDelta,
          faltasDelta
        );

        if (!usuarioAtualizado) return;

        const { error: erroAgenda } = await client
          .from("agendamentos")
          .update({
            status: "compareceu",
            presenca_confirmada_em: new Date().toISOString()
          })
          .eq("id", agendamentoId);

        if (erroAgenda) {
          alert("Erro ao confirmar presença: " + erroAgenda.message);
          return;
        }

        alert("Presença confirmada!");
        carregarAgendamentos();

      } catch (err) {
        alert("Erro ao confirmar presença: " + err.message);
      }
    }

    // ===============================
    // FUNÇÃO: MARCAR FALTA
    //
    // Regras:
    // - Se estava "agendado": soma +1 falta
    // - Se estava "compareceu": corrige, tira 1 presença e soma 1 falta
    // - Se já estava "faltou": não soma de novo
    // - Se chegar a 2 faltas, bloqueia o usuário
    // ===============================
    async function marcarFalta(agendamentoId) {
      const confirmar = confirm("Marcar falta para este jovem?");
      if (!confirmar) return;

      try {
        const agendamento = await buscarAgendamentoPorId(agendamentoId);

        if (!agendamento) {
          alert("Agendamento não encontrado.");
          return;
        }

        const statusAtual = agendamento.status || "agendado";

        if (statusAtual === "faltou") {
          alert("Este agendamento já está marcado como falta.");
          return;
        }

        if (statusAtual === "cancelado") {
          alert("Este agendamento está cancelado e não pode receber falta.");
          return;
        }

        let presencasDelta = 0;
        let faltasDelta = 1;

        // Se estava como compareceu e você corrigiu para falta,
        // remove uma presença também.
        if (statusAtual === "compareceu") {
          presencasDelta = -1;
        }

        const usuarioAtualizado = await atualizarContadoresUsuario(
          agendamento.telefone,
          presencasDelta,
          faltasDelta
        );

        if (!usuarioAtualizado) return;

        const { error: erroAgenda } = await client
          .from("agendamentos")
          .update({
            status: "faltou"
          })
          .eq("id", agendamentoId);

        if (erroAgenda) {
          alert("Erro ao marcar falta: " + erroAgenda.message);
          return;
        }

        alert("Falta registrada!");
        carregarAgendamentos();

      } catch (err) {
        alert("Erro ao marcar falta: " + err.message);
      }
    }

    // ===============================
    // FUNÇÃO: CANCELAR AGENDAMENTO
    //
    // Regra:
    // - Só cancela agendamento ainda "agendado"
    // - Não cancela se já foi marcado como falta ou presença
    // ===============================
    async function cancelarAgendamento(agendamentoId) {
      const confirmar = confirm("Cancelar este agendamento?");
      if (!confirmar) return;

      try {
        const agendamento = await buscarAgendamentoPorId(agendamentoId);

        if (!agendamento) {
          alert("Agendamento não encontrado.");
          return;
        }

        const statusAtual = agendamento.status || "agendado";

        if (statusAtual !== "agendado") {
          alert("Só é possível cancelar agendamentos que ainda estão como agendados.");
          return;
        }

        const { error } = await client
          .from("agendamentos")
          .update({
            status: "cancelado"
          })
          .eq("id", agendamentoId);

        if (error) {
          alert("Erro ao cancelar: " + error.message);
          return;
        }

        alert("Agendamento cancelado!");
        carregarAgendamentos();

      } catch (err) {
        alert("Erro ao cancelar: " + err.message);
      }
    }

    // ===============================
    // BOTÃO: FILTRAR
    // ===============================
    btnFiltrar.addEventListener("click", carregarAgendamentos);

    // ===============================
    // BOTÃO: LIMPAR FILTROS
    // ===============================
    btnLimpar.addEventListener("click", () => {
      filtroData.value = "";
      filtroStatus.value = "";
      carregarAgendamentos();
    });

    // ===============================
    // CARREGAR AGENDAMENTOS AO ABRIR O PAINEL
    // ===============================
    carregarAgendamentos();
  </script>
</body>
</html>
